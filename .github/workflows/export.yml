name: Export context for WAIQ Technology Radar

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Nombre del entorno (solo para el nombre del archivo)'
        required: false
        default: 'default'

jobs:
  generate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from radar config
        env:
          ENV_NAME: ${{ github.event.inputs.env_name }}
        run: |
          set -e
          mkdir -p output
          ENV_FILE="output/.env.${ENV_NAME}"

          echo "Escribiendo en $ENV_FILE"

          # Escribimos el archivo línea a línea (sin bloque { } para evitar problemas)
          {
            echo "# .env generado desde GitHub Actions (WAIQ Technology Radar)"
            echo "# Run ID: ${{ github.run_id }}"
            echo ""
            echo "# --- LLM ---"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}"
            echo ""
            echo "# --- Search ---"
            echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}"
            echo "SEARXNG_URL=${{ secrets.SEARXNG_URL }}"
            echo ""
            echo "# --- Email ---"
            echo "SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}"
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}"
            echo ""
            echo "# --- GitHub (para push al repo waiq-multi) ---"
            echo "WAIQ_GITHUB_TOKEN=${{ secrets.WAIQ_GITHUB_TOKEN }}"
            echo ""
            echo "# --- LLM config (vars de repositorio; opcionales) ---"
            echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER }}"
            echo "LLM_MODEL=${{ vars.LLM_MODEL }}"
            echo "LLM_MODEL_FILTER=${{ vars.LLM_MODEL_FILTER }}"
          } > "$ENV_FILE"

          echo "Contenido real en disco:"
          ls -l output
          echo "----------"
          cat "$ENV_FILE"

      - name: Upload .env as artifact
        uses: actions/upload-artifact@v4
        with:
          name: waiq-env-${{ github.event.inputs.env_name }}
          path: output
          if-no-files-found: error
          retention-days: 7